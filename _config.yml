# Site Settings
encoding: UTF-8
exclude: ["*.gem", "*.gemspec", "Gemfile", "Gemfile.lock", "node_modules", "Rakefile", "starter-kit", "vendor"]
lang: en # Language code as defined in _data/i18n.yml. en, en-gb, en-us, zh, zh-cn, zh-tw etc.
permalink: /blog/:year/:month/:day/:title/

whitelist: [jekyll-feed, jekyll-redirect-from, jekyll-seo-tag, jekyll-sitemap]
plugins:
  - jekyll-feed
  - jekyll-redirect-from
  - jekyll-seo-tag
  - jekyll-sitemap

markdown: kramdown
kramdown:
  auto_id_prefix: 'heading-'
  smart_quotes: ["apos", "apos", "quot", "quot"]
  toc_levels: 1..3

sass:
  style: compressed

# Site Data
url: https://shitao.me
baseurl: # the subpath of your site, e.g. /blog
title: Stone & Wave
description: "A gem-based responsive simple texture styled Jekyll theme."
keywords: 'jekyll,theme,gem-based,blog'
author:
  name: shitao
  job_title:
  location:
  email:
  social_links:
    - name: facebook
      url:
    - name: github
      url: 
    - name: linkedin
      url:
home:
  section1: <h1>Stone & Wave</h1>
  section2: <h2>A gem-based responsive simple texture styled Jekyll theme</h2>
  section3: <div class="social-links"><a class="ico-github btn" href="https://github.com/yizeng/jekyll-theme-simple-texture" title="View on GitHub"></a></div>
blog:
  cc_license: http://creativecommons.org/licenses/by-sa/4.0/ # A link to CC License of your choice.
  cc_license_image: /assets/images/theme/cc-by-sa.png # An image of your CC License. 
  footer_content: A gem-based responsive simple texture styled <a href="http://jekyllrb.com/">Jekyll</a> theme.

disqus:
  shortname: # e.g. yizeng
  public_key: # e.g. ULZ0b9TFefCUJHKQd4JCKv2v3u27YoG7YG8zXPewkWrT333Z0Se9YnxLzoV6VM8W

# Giscus comment system. See https://giscus.app to generate your config.
# Steps:
#   1. Go to https://giscus.app
#   2. Enter your repo: Tachone/Tachone.github.io
#   3. Enable Discussions on your GitHub repo (Settings -> Features -> Discussions)
#   4. Choose a discussion category (recommended: "Announcements")
#   5. Copy the generated repo_id and category_id below
giscus:
  repo: Tachone/Tachone.github.io
  repo_id: R_kgDOR8KbXA      # Paste your repo_id here, e.g. R_kgDOxxxxxxxx
  category: Announcements
  category_id: DIC_kwDOR8KbXM4C6zrK   # Paste your category_id here, e.g. DIC_kwDOxxxxxxxx
  mapping: pathname # How to map pages to discussions: pathname, url, title, og:title
  reactions_enabled: 1  # Show reactions (1 = yes, 0 = no)
  input_position: bottom  # Where to put the comment box: top or bottom
  theme: light      # Theme: light, dark, preferred_color_scheme, etc.
  lang: en          # Comment language
google_tag_manager: # e.g. 'GTM-KCQJXZ8F'
addthis_public_id: # AddThis sharing plugin. See http://www.addthis.com/. E.g. ra-53329e27694534j5 

paths:
  home: /
  blog: /blog/
  categories: /blog/categories/
  tags: /blog/tags/
