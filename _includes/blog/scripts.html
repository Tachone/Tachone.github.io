<script>
$(document).ready(function () {
    var offset = 50,
        duration = 500,
        width = 960;
    $(window).scroll(function () {
        if ($(window).width() > width) {
            if ($(this).scrollTop() > offset) {
                $('footer').css('top', '20px');
                $('footer .back-to-top').fadeIn(duration);
            } else {
                $('footer').css('top', 'auto');
                $('footer .back-to-top').fadeOut(duration);
            }
        }
    });
    $(window).resize(function () {
        if ($(window).width() < width) {
            $('footer').css('top', 'auto');
            $('footer .back-to-top').fadeOut(duration);
        }
        if ($(window).width() >= width && $(this).scrollTop() > offset) {
            $('footer').css('top', '20px');
            $('footer .back-to-top').fadeIn(duration);
        }
    });

    $('footer .back-to-top, .gotop').on('click', function (event) {
        event.preventDefault();
        $('html, body').animate({
            scrollTop: 0
        }, duration);
        return false;
    });

    $('.show-hidden').on('click', function () {
        $(this).parent().next().toggleClass("hidden");
        $(this).toggleClass("hidden");
    });
});
</script>

(function ($, window, undefined) {
    var closeOverlay = function () {
        $('.nav-wrapper, .search-wrapper').removeAttr('style');
        $(".nav-form, .search-form").removeClass('active');
        $("body").removeClass('nav-overlay search-overlay');
    };

    $('.nav-global .btn-search').on('click', function () {
        $('.search-wrapper').css({display: "block"});
        $(".search-form").addClass('active');
        $(".search-form").find('input').focus();
        $("body").addClass('search-overlay');
    });

    $('.nav-global .btn-menu').on('click', function () {
        $('.nav-wrapper').css({display: "block"});
        $(".nav-form").addClass('active');
        $(".nav-form .search-field").prop('disabled', true);
        $("body").addClass('nav-overlay');
    });

    $('.nav-wrapper .btn-close, .search-wrapper .btn-close').on('click', function () {
        closeOverlay();
    });

    $(document).on('keyup', function (e) {
        if (e.keyCode === 27) {
            closeOverlay();
        }
    });
})(jQuery, window);
</script>

<!-- Table of Contents auto-generation -->
<script>
(function () {
    function buildToc() {
        var tocNav = document.getElementById('toc-nav');
        if (!tocNav) return;

        var articleBody = document.querySelector('[itemprop="articleBody"]');
        if (!articleBody) return;

        var headings = articleBody.querySelectorAll('h2, h3');
        if (headings.length < 2) {
            var tocContainer = document.getElementById('article-toc');
            if (tocContainer) tocContainer.style.display = 'none';
            return;
        }

        var tocList = document.createElement('ul');
        var currentParent = tocList;
        var currentH2Item = null;
        
        headings.forEach(function (heading, index) {
            if (!heading.id) {
                heading.id = 'toc-heading-' + index;
            }
            
            var listItem = document.createElement('li');
            listItem.className = 'toc-' + heading.tagName.toLowerCase();

            var link = document.createElement('a');
            link.href = '#' + heading.id;
            link.textContent = heading.textContent;
            link.addEventListener('click', function (event) {
                event.preventDefault();
                document.getElementById(heading.id).scrollIntoView({ behavior: 'smooth' });
            });

            listItem.appendChild(link);
            
            if (heading.tagName === 'H2') {
                tocList.appendChild(listItem);
                currentH2Item = listItem;
            } else if (heading.tagName === 'H3') {
                var subList = currentH2Item.querySelector('ul');
                if (!subList) {
                    subList = document.createElement('ul');
                    currentH2Item.appendChild(subList);
                }
                subList.appendChild(listItem);
            }
        });

        tocNav.appendChild(tocList);
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', buildToc);
    } else {
        buildToc();
    }
})();
</script>

<!-- Code block copy button -->
<script>
(function () {
    function addCopyButtons() {
        document.querySelectorAll('div.highlight').forEach(function (codeBlock) {
            var copyButton = document.createElement('button');
            copyButton.className = 'code-copy-btn';
            copyButton.type = 'button';
            copyButton.innerText = 'Copy';

            copyButton.addEventListener('click', function () {
                var code = codeBlock.querySelector('code') || codeBlock.querySelector('pre');
                navigator.clipboard.writeText(code.innerText.trimEnd()).then(function () {
                    copyButton.innerText = 'Copied!';
                    setTimeout(function () {
                        copyButton.innerText = 'Copy';
                    }, 2000);
                });
            });

            codeBlock.style.position = 'relative';
            codeBlock.appendChild(copyButton);
        });
    }

    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', addCopyButtons);
    } else {
        addCopyButtons();
    }
})();
</script>

<script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';

    // kramdown renders ```mermaid as <pre><code class="language-mermaid">
    // convert them to <div class="mermaid"> before mermaid initializes
    document.querySelectorAll('pre > code.language-mermaid').forEach(function(code) {
        var div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = code.textContent;
        code.parentNode.replaceWith(div);
    });

    mermaid.initialize({ startOnLoad: true, theme: 'neutral' });
</script>
